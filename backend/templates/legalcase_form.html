{% extends "base.html" %}
{% block title %}{% if editing %}Edit{% else %}New{% endif %} LegalCase | NexusLegal{% endblock %}
{% block page_title %}{% if editing %}Edit LegalCase{% else %}New LegalCase{% endif %}{% endblock %}
{% block content %}
<div class="card" style="max-width:750px">
  <form method="post">
    {% csrf_token %}
    <div class="form-row">
      <div class="form-group">
        <label>Title</label>
        <input type="text" name="title" value="{{ record.title|default:'' }}">
      </div>
      <div class="form-group">
        <label>Case Number</label>
        <input type="text" name="case_number" value="{{ record.case_number|default:'' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Client Name</label>
        <input type="text" name="client_name" value="{{ record.client_name|default:'' }}">
      </div>
      <div class="form-group">
        <label>Case Type</label>
        <select name="case_type">
          <option value="civil" {% if record.case_type == 'civil' %}selected{% endif %}>Civil</option>
          <option value="criminal" {% if record.case_type == 'criminal' %}selected{% endif %}>Criminal</option>
          <option value="corporate" {% if record.case_type == 'corporate' %}selected{% endif %}>Corporate</option>
          <option value="family" {% if record.case_type == 'family' %}selected{% endif %}>Family</option>
          <option value="ip" {% if record.case_type == 'ip' %}selected{% endif %}>IP</option>
          <option value="labor" {% if record.case_type == 'labor' %}selected{% endif %}>Labor</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Status</label>
        <select name="status">
          <option value="open" {% if record.status == 'open' %}selected{% endif %}>Open</option>
          <option value="in_progress" {% if record.status == 'in_progress' %}selected{% endif %}>In Progress</option>
          <option value="hearing" {% if record.status == 'hearing' %}selected{% endif %}>Hearing</option>
          <option value="settled" {% if record.status == 'settled' %}selected{% endif %}>Settled</option>
          <option value="closed" {% if record.status == 'closed' %}selected{% endif %}>Closed</option>
        </select>
      </div>
      <div class="form-group">
        <label>Court</label>
        <input type="text" name="court" value="{{ record.court|default:'' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Next Hearing</label>
        <input type="date" name="next_hearing" value="{{ record.next_hearing|date:'Y-m-d'|default:'' }}">
      </div>
    </div>

    <div style="display:flex;gap:0.75rem;margin-top:1rem">
      <button type="submit" class="btn btn-primary">{% if editing %}Update{% else %}Create{% endif %} LegalCase</button>
      <a href="/legalcases/" class="btn" style="background:var(--border);color:var(--text)">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
